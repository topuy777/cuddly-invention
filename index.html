<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Farm Guppy777</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#e8f5e9,#c8e6c9);
}

/* HEADER */
header {
  text-align:center;
  padding:30px;
  color:#1b5e20;
}

header h1 {
  margin:0;
  font-size:32px;
}

/* FILTER */
.filter {
  text-align:center;
  margin-bottom:20px;
}

.filter button {
  margin:5px;
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:#2e7d32;
  color:white;
  cursor:pointer;
}

.filter button:hover {
  background:#1b5e20;
}

/* GRID */
.products {
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:15px;
  padding:20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  border-radius:15px;
  padding:10px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  transition:0.4s;
  animation:fadeIn 0.8s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
}

.card img {
  width:100%;
  border-radius:10px;
}

.badge {
  position:absolute;
  background:red;
  color:white;
  padding:3px 8px;
  border-radius:10px;
  font-size:12px;
}

.price {
  color:#1b5e20;
  font-weight:bold;
}

button {
  background:#2e7d32;
  color:white;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}

button:hover {
  background:#1b5e20;
}

/* CART */
.cart {
  position:fixed;
  right:20px;
  top:20px;
  background:white;
  padding:15px;
  border-radius:12px;
  width:250px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* FOOTER */
footer {
  background:#1b5e20;
  color:white;
  text-align:center;
  padding:20px;
}

.social a {
  color:white;
  margin:0 10px;
  text-decoration:none;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1;}
}

/* RESPONSIVE */
@media(max-width:1000px){
  .products {grid-template-columns: repeat(2,1fr);}
}
</style>
</head>

<body>

<header>
  <h1>🐟🌿 Farm Guppy777</h1>
  <p>Guppy premium & perlengkapan aquarium</p>
</header>

<div class="filter">
  <button onclick="filter('all')">Semua</button>
  <button onclick="filter('ikan')">Ikan</button>
  <button onclick="filter('aksesoris')">Aksesoris</button>
</div>

<div class="products" id="productList">

  <div class="card" data-kategori="ikan">
    <div class="badge">BEST</div>
    <img src="https://via.placeholder.com/150">
    <h3>Guppy Cobra</h3>
    <p class="price">75000</p>
    <button onclick="addCart('Guppy Cobra',75000)">+ Keranjang</button>
  </div>

  <div class="card" data-kategori="ikan">
    <div class="badge">NEW</div>
    <img src="https://via.placeholder.com/150">
    <h3>Guppy Dumbo</h3>
    <p class="price">85000</p>
    <button onclick="addCart('Guppy Dumbo',85000)">+ Keranjang</button>
  </div>

  <div class="card" data-kategori="aksesoris">
    <img src="https://via.placeholder.com/150">
    <h3>Tanaman Air</h3>
    <p class="price">30000</p>
    <button onclick="addCart('Tanaman Air',30000)">+ Keranjang</button>
  </div>

  <div class="card" data-kategori="aksesoris">
    <img src="https://via.placeholder.com/150">
    <h3>Pakan Ikan</h3>
    <p class="price">20000</p>
    <button onclick="addCart('Pakan Ikan',20000)">+ Keranjang</button>
  </div>

  <div class="card" data-kategori="aksesoris">
    <img src="https://via.placeholder.com/150">
    <h3>Aquarium Mini</h3>
    <p class="price">120000</p>
    <button onclick="addCart('Aquarium Mini',120000)">+ Keranjang</button>
  </div>

</div>

<div class="cart">
  <h3>🛒 Keranjang</h3>
  <ul id="cartList"></ul>
  <p>Total: Rp <span id="total">0</span></p>
  <button onclick="checkout()">Checkout WA</button>
</div>

<footer>
  <h3>Kontak</h3>
  <p>WA: 081234567890</p>
  <div class="social">
    <a href="https://wa.me/6281234567890">WhatsApp</a> |
    <a href="https://instagram.com/username">Instagram</a> |
    <a href="https://facebook.com/username">Facebook</a>
  </div>
  <p>© 2026 Farm Guppy777</p>
</footer>

<script>
let cart = [];
let total = 0;

function addCart(nama, harga){
  cart.push({nama,harga});
  total += harga;
  renderCart();
}

function renderCart(){
  let list = document.getElementById("cartList");
  list.innerHTML = "";

  cart.forEach(item=>{
    let li = document.createElement("li");
    li.innerText = item.nama + " - Rp " + item.harga;
    list.appendChild(li);
  });

  document.getElementById("total").innerText = total;
}

function checkout(){
  let pesan = "Halo saya mau beli:%0A";
  cart.forEach(item=>{
    pesan += "- " + item.nama + "%0A";
  });
  pesan += "Total: Rp " + total;

  window.open("https://wa.me/6281234567890?text=" + pesan);
}

/* FILTER */
function filter(kategori){
  let items = document.querySelectorAll(".card");

  items.forEach(item=>{
    if(kategori === 'all'){
      item.style.display = "block";
    } else {
      item.style.display = item.dataset.kategori === kategori ? "block" : "none";
    }
  });
}
</script>

</body>
</html>
