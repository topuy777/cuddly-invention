<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Jualan - Pink Lotus</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: radial-gradient(circle at center, #2b001a, #0a0006);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Background Lotus Pattern */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(circle at 50% 50%, rgba(255,105,180,0.15) 0%, transparent 60%),
                      url('https://www.transparenttextures.com/patterns/flowers.png');
    opacity: 0.25;
    z-index: 0;
}

/* Container */
.container {
    text-align: center;
    position: relative;
    z-index: 2;
}

/* Glow Circle */
.glow-circle {
    width: 500px;
    height: 500px;
    border-radius: 50%;
    border: 6px solid #ff66cc;
    box-shadow: 0 0 40px #ff33aa, inset 0 0 30px #ff66cc;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #400020, #100008);
}

/* Card */
.card {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(255, 0, 150, 0.8);
    width: 300px;
}

.card h1 {
    font-size: 28px;
    color: #ff99dd;
    margin-bottom: 10px;
    text-shadow: 0 0 10px #ff33aa;
}

.card p {
    font-size: 14px;
    margin-bottom: 20px;
    color: #ddd;
}

/* Buttons */
.btn {
    display: block;
    padding: 12px;
    margin: 10px 0;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn-primary {
    background: #ff66cc;
    color: #000;
    box-shadow: 0 0 15px #ff66cc;
}

.btn-primary:hover {
    background: #ff85d6;
    transform: scale(1.05);
}

.btn-secondary {
    border: 2px solid #ff66cc;
    color: #ff99dd;
}

.btn-secondary:hover {
    background: #ff66cc;
    color: #000;
}

/* Floating Lotus (bubbles replaced) */
.lotus {
    position: absolute;
    width: 60px;
    height: 60px;
    background: radial-gradient(circle, #ff66cc, #99004d);
    border-radius: 50% 50% 0 50%;
    transform: rotate(45deg);
    box-shadow: 0 0 15px #ff33aa;
    animation: float 6s infinite ease-in-out;
}

.lotus:nth-child(1) { top: 10%; left: 20%; }
.lotus:nth-child(2) { bottom: 15%; right: 25%; }
.lotus:nth-child(3) { top: 70%; left: 10%; }

@keyframes float {
    0% { transform: translateY(0) rotate(45deg); }
    50% { transform: translateY(-20px) rotate(45deg); }
    100% { transform: translateY(0) rotate(45deg); }
}

footer {
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="container">

    <!-- Lotus Floating -->
    <div class="lotus"></div>
    <div class="lotus"></div>
    <div class="lotus"></div>

    <div class="glow-circle">
        <div class="card">
            <h1>Brand Kamu</h1>
            <p>Produk cantik & elegan dengan sentuhan lotus</p>

            <a href="#" class="btn btn-primary">BELI SEKARANG</a>
            <a href="#" class="btn btn-secondary">LIHAT PRODUK</a>
            <a href="#" class="btn btn-secondary">WHATSAPP</a>
        </div>
    </div>

    <footer>
        © 2026 Brand Kamu
    </footer>

</div>

</body>
</html>
